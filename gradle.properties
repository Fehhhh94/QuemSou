# Project-wide Gradle settings.

# Specifies the JVM arguments used for the daemon process.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# When configured, Gradle will run in incubating parallel mode.
org.gradle.parallel=true

# AndroidX package structure to make it clearer which packages are bundled
# with the Android operating system, and which are packaged with the app's APK.
android.useAndroidX=true

# Kotlin code style for this project: "official" or "obsolete".
kotlin.code.style=official

# JDK usado pelo Gradle (JBR do Android Studio, JVM 21) — evita depender do
# JAVA_HOME da máquina, que pode apontar para um Java antigo.
org.gradle.java.home=C:/Program Files/Android/Android Studio/jbr

# Enables namespacing of each library's R class so that its R class includes
# only the resources declared in the library itself.
android.nonTransitiveRClass=true
